<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Stopwatch</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts (fixed broken link) -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
>
</head>
<body>

    <div class="container">
        <h1>STOPWATCH</h1>

        <div class="timer-display">
            <span id="hours">00</span>:
            <span id="minutes">00</span>:
            <span id="seconds">00</span>:
            <span id="milliseconds">00</span>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn primary">Start</button>
            <button id="resetBtn" class="btn danger">Reset</button>
        </div>

        <div class="laps-container">
            <h3>Laps</h3>
            <div id="laps-list" class="laps-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
